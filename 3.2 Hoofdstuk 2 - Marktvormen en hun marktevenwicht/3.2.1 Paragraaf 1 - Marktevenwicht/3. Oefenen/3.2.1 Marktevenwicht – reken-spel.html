<body>
    <div id="root"></div>
    <script type="text/babel">

const ArrowLeft = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>;
const Trophy = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 010-5H6"/><path d="M18 9h1.5a2.5 2.5 0 000-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20 17 22"/><path d="M18 2H6v7a6 6 0 0012 0V2z"/></svg>;

const RotateCcw = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 109-9 9.75 9.75 0 00-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;



/* в”Җв”Җ helpers в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
const ri = (a, b) => a + Math.floor(Math.random() * (b - a + 1));
const pick = arr => arr[Math.floor(Math.random() * arr.length)];
const round1 = n => Math.round(n * 10) / 10;
const round2 = n => Math.round(n * 100) / 100;

/* в”Җв”Җ skill definitions в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
const SKILLS = [
  { id:"F1", name:"Lineaire functie opstellen", layer:0, needs:[] },
  { id:"F2", name:"Vergelijking oplossen", layer:0, needs:[] },
  { id:"F3", name:"Functie omschrijven (PвҶ”Q)", layer:0, needs:[] },
  { id:"F4", name:"Substitueren", layer:0, needs:[] },
  { id:"F5", name:"Oppervlakte driehoek", layer:0, needs:[] },
  { id:"F6", name:"Afgeleide bepalen", layer:0, needs:[] },
  { id:"B1", name:"Evenwichtsprijs & -hoeveelheid", layer:1, needs:["F1","F2"] },
  { id:"B2", name:"TO-functie opstellen", layer:1, needs:["F1","F3"] },
  { id:"B3", name:"TK-functie herkennen", layer:1, needs:["F1"] },
  { id:"B4", name:"Horizontaal optellen", layer:1, needs:["F3"] },
  { id:"B5", name:"MO bepalen", layer:1, needs:["F6","B2"] },
  { id:"B6", name:"MK bepalen", layer:1, needs:["F6","B3"] },
  { id:"B7", name:"GTK bepalen", layer:1, needs:["B3"] },
  { id:"S1", name:"Surplus berekenen (CS/PS)", layer:2, needs:["B1","F5"] },
  { id:"S2", name:"MO = MK oplossen", layer:2, needs:["B5","B6","F2"] },
  { id:"S3", name:"Winst = TO вҲ’ TK", layer:2, needs:["B2","B3","F4"] },
  { id:"S4", name:"Break-even (TO = TK)", layer:2, needs:["B2","B3","F2"] },
  { id:"S5", name:"Evenwicht met heffing", layer:2, needs:["B1","F1"] },
  { id:"S6", name:"Collectief aanbod bepalen", layer:2, needs:["B4","F3"] },
  { id:"E1", name:"Break-even analyse", layer:3, needs:["S4"] },
  { id:"E2", name:"Consumentensurplus", layer:3, needs:["S1"] },
  { id:"E3", name:"Individueel вҶ’ collectief aanbod", layer:3, needs:["S6"] },
  { id:"E4", name:"Welvaartsverlies belasting", layer:3, needs:["S1","S5"] },
  { id:"E5", name:"Optimale productie bij VM", layer:3, needs:["B6","B7","F4"] },
  { id:"E6", name:"Effecten invoerrecht", layer:3, needs:["S1","S5","B1"] },
  { id:"E7", name:"Max. winst monopolist", layer:3, needs:["S2","S3","F4"] },
  { id:"E8", name:"Prijsdiscriminatie", layer:3, needs:["S2","S3"] },
];


const ALL_SKILLS = SKILLS;
const ACTIVE_IDS = new Set(["F1","F2","F3","F4","F5","F6","B1","S1"]);
const FILTERED_SKILLS = ALL_SKILLS.filter(s => ACTIVE_IDS.has(s.id)).map(s => ({
    ...s, needs: s.needs.filter(n => ACTIVE_IDS.has(n))
}));
const LAYER_NAMES = ["Fundament","Bouwstenen","Samengesteld","Eindbazen"];
const LAYER_COLORS = [
  { bg:"#1e3a5f", text:"#93c5fd", glow:"rgba(59,130,246,0.3)" },
  { bg:"#2d2250", text:"#c4b5fd", glow:"rgba(139,92,246,0.3)" },
  { bg:"#1a3a2a", text:"#86efac", glow:"rgba(52,211,153,0.3)" },
  { bg:"#4a1a1a", text:"#fca5a5", glow:"rgba(248,113,113,0.3)" },
];

/* в”Җв”Җ exercise generators в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
const GEN = {
  F1: (stars) => {
    const slope = ri(2, 6), intercept = slope * ri(10, 25);
    return {
      context: `De vraag naar een product daalt met ${slope} stuks per euro prijsverhoging. Bij een prijs van вӮ¬0 is de vraag ${intercept} stuks.`,
      steps: [
        { q:`Hoeveel is de vraag bij P = 0?`, a:intercept, hint:"Dit staat direct in de opgave.", expl:`Bij P = 0 is Qv = ${intercept}.` },
        { q:`Met hoeveel stuks daalt de vraag per euro prijsverhoging?`, a:slope, hint:"Zoek het woord 'daalt' in de tekst.", expl:`Per euro stijging daalt de vraag met ${slope}.` },
        { q:`De vraaglijn is Qv = ${intercept} + ? Г— P. Wat is de coГ«fficiГ«nt van P? (let op het teken!)`, a:-slope, hint:`De vraag daalt, dus de coГ«fficiГ«nt is negatief.`, expl:`Qv = ${intercept} вҲ’ ${slope}P, dus de coГ«fficiГ«nt is вҲ’${slope}.` },
      ]
    };
  },

  F2: (stars) => {
    const Q = ri(5, 20), b = ri(2, 5), d = ri(1, 4);
    const c = ri(10, 40), a = c + Q * (b + d);
    return {
      context: `Los op: ${a} вҲ’ ${b}Q = ${c} + ${d}Q`,
      steps: [
        { q:`Breng alle Q-termen naar links. Wat is de coГ«fficiГ«nt van Q?`, a: b+d, hint:`Tel de coГ«fficiГ«nten op: ${b} + ${d}`, expl:`${b}Q + ${d}Q = ${b+d}Q` },
        { q:`Breng de constanten naar rechts: ${a} вҲ’ ${c} = ?`, a: a-c, hint:`Trek ${c} af van ${a}.`, expl:`${a} вҲ’ ${c} = ${a-c}` },
        { q:`Los op: ${b+d}Q = ${a-c}. Q = ?`, a: Q, hint:`Deel ${a-c} door ${b+d}.`, expl:`Q = ${a-c} Г· ${b+d} = ${Q}` },
      ]
    };
  },

  F3: (stars) => {
    const b = pick([2, 4, 5]), aOver = ri(10, 30), a = b * aOver;
    const coefQ = round2(1 / b);
    return {
      context: `Schrijf om: Qv = ${a} вҲ’ ${b}P  вҶ’  P = ?`,
      steps: [
        { q:`Isoleer ${b}P: ${b}P = ${a} вҲ’ Q. Deel alles door ${b}. Wat wordt de constante?`, a: aOver, hint:`${a} Г· ${b} = ?`, expl:`${a} Г· ${b} = ${aOver}` },
        { q:`P = ${aOver} + ? Г— Q. Wat is de coГ«fficiГ«nt van Q? (let op het teken!)`, a: -coefQ, hint:`Je deelt вҲ’Q door ${b}. Het wordt negatief.`, expl:`P = ${aOver} вҲ’ ${coefQ}Q, dus de coГ«fficiГ«nt is вҲ’${coefQ}.` },
      ]
    };
  },

  F4: (stars) => {
    const a = ri(30, 80), b = pick([2, 3, 4, 5]), Q = ri(3, 15);
    const ans = a - b * Q;
    return {
      context: `Gegeven: P = ${a} вҲ’ ${b}Q. Bereken P als Q = ${Q}.`,
      steps: [
        { q:`Bereken ${b} Г— ${Q} = ?`, a: b*Q, hint:`Vermenigvuldig ${b} met ${Q}.`, expl:`${b} Г— ${Q} = ${b*Q}` },
        { q:`P = ${a} вҲ’ ${b*Q} = ?`, a: ans, hint:`Trek ${b*Q} af van ${a}.`, expl:`P = ${a} вҲ’ ${b*Q} = ${ans}` },
      ]
    };
  },

  F5: (stars) => {
    const base = ri(4, 20) * 2, height = ri(4, 20) * 2;
    const area = 0.5 * base * height;
    return {
      context: `Bereken de oppervlakte van een driehoek met basis = ${base} en hoogte = ${height}.`,
      steps: [
        { q:`Formule: ВҪ Г— basis Г— hoogte. Bereken basis Г— hoogte.`, a: base*height, hint:`${base} Г— ${height} = ?`, expl:`${base} Г— ${height} = ${base*height}` },
        { q:`Deel door 2. Oppervlakte = ?`, a: area, hint:`${base*height} Г· 2 = ?`, expl:`Oppervlakte = ВҪ Г— ${base} Г— ${height} = ${area}` },
      ]
    };
  },

  F6: (stars) => {
    const a = ri(1, 4), b = ri(3, 12), c = ri(10, 100);
    return {
      context: `Bepaal de afgeleide van f(Q) = ${a}QВІ + ${b}Q + ${c}.`,
      steps: [
        { q:`Afgeleide van ${a}QВІ: breng de macht naar voren. ? Г— Q`, a: 2*a, hint:`Macht (2) Г— coГ«fficiГ«nt (${a}) = ?`, expl:`${a}QВІ вҶ’ ${2*a}Q` },
        { q:`Afgeleide van ${b}Q = ?`, a: b, hint:`De afgeleide van bQ is gewoon b.`, expl:`${b}Q вҶ’ ${b}` },
        { q:`Afgeleide van de constante ${c} = ?`, a: 0, hint:`Een constante verdwijnt bij differentiГ«ren.`, expl:`De afgeleide van een constante is 0.` },
      ]
    };
  },

  B1: (stars) => {
    const b = ri(2, 5), d = ri(1, 4), Ps = ri(8, 25);
    const maxC = Math.min(50, d * Ps - 1);
    if (maxC < 2) return GEN.B1(stars);
    const c = ri(2, maxC);
    const a = (b + d) * Ps - 2 * c;
    if (a <= 0) return GEN.B1(stars);
    const alpha = a + c;
    const Qs = alpha - b * Ps;
    if (Qs <= 0) return GEN.B1(stars);
    return { context: `Qv = ${alpha} вҲ’ ${b}P  en  Qa = вҲ’${c} + ${d}P. Bereken het marktevenwicht.`, steps: [
      { q:`Stel Qv = Qa en los op. P* = ?`, a: Ps, hint:`${alpha} вҲ’ ${b}P = вҲ’${c} + ${d}P вҶ’ ${b+d}P = ${alpha+c}`, expl:`P* = ${alpha+c} Г· ${b+d} = ${Ps}` },
      { q:`Q* = ?`, a: Qs, hint:`Vul P* in bij Qv: ${alpha} вҲ’ ${b}Г—${Ps}`, expl:`Q* = ${Qs}` },
    ]};
  },

  B2: (stars) => {
    const a = ri(30, 80), b = ri(1, 4);
    return {
      context: `De vraaglijn is P = ${a} вҲ’ ${b}Q. Stel de TO-functie op (TO = P Г— Q).`,
      steps: [
        { q:`TO = P Г— Q = (${a} вҲ’ ${b}Q) Г— Q. Werk de haakjes uit. Wat is de coГ«fficiГ«nt van Q?`, a: a, hint:`${a} Г— Q вҶ’ coГ«fficiГ«nt is ${a}.`, expl:`De eerste term is ${a}Q.` },
        { q:`Wat is de coГ«fficiГ«nt van QВІ? (let op het teken!)`, a: -b, hint:`вҲ’${b}Q Г— Q = вҲ’${b}QВІ. De coГ«fficiГ«nt is negatief.`, expl:`TO = ${a}Q вҲ’ ${b}QВІ, dus de coГ«fficiГ«nt van QВІ is вҲ’${b}.` },
      ]
    };
  },

  B3: (stars) => {
    const a = round1(ri(1, 5) * 0.5), b = ri(5, 20), c = ri(50, 300);
    const Q = ri(5, 15);
    const vk = round1(a * Q * Q + b * Q);
    return {
      context: `TK = ${a}QВІ + ${b}Q + ${c}`,
      steps: [
        { q:`Wat zijn de vaste kosten (kosten als Q = 0)?`, a: c, hint:`Vul Q = 0 in.`, expl:`TK(0) = ${c}, dus de vaste kosten = ${c}.` },
        { q:`Bereken de variabele kosten bij Q = ${Q}: ${a}Г—${Q}ВІ + ${b}Г—${Q} = ?`, a: vk, hint:`${a}Г—${Q*Q} + ${b}Г—${Q} = ?`, expl:`${a}Г—${Q*Q} + ${b*Q} = ${vk}` },
      ]
    };
  },

  B4: (stars) => {
    const a1 = ri(1, 3), c1 = ri(4, 12), a2 = ri(1, 3), c2 = ri(4, 12);
    // P = a1*Qa + c1, P = a2*Qb + c2 вҶ’ Qa = (P-c1)/a1, Qb = (P-c2)/a2
    // For clean numbers, use a1=a2=1 sometimes
    const minP = Math.max(c1, c2);
    return {
      context: `Bedrijf A: P = ${a1}Qa + ${c1}\nBedrijf B: P = ${a2}Qb + ${c2}\nBepaal het collectieve aanbod.`,
      steps: [
        { q:`Schrijf Qa als functie van P: Qa = (P вҲ’ ${c1}) / ${a1}. Vanaf welke prijs biedt A aan?`, a: c1, hint:`Qa вүҘ 0 als P вүҘ ?`, expl:`A biedt aan vanaf P = ${c1}.` },
        { q:`Vanaf welke prijs biedt B aan?`, a: c2, hint:`Qb вүҘ 0 als P вүҘ ?`, expl:`B biedt aan vanaf P = ${c2}.` },
        { q:`Bij P = ${minP + a1*a2*2}: Qa = (${minP + a1*a2*2} вҲ’ ${c1})/${a1} = ?`, a: round1((minP+a1*a2*2-c1)/a1), hint:`Vul P in en reken uit.`, expl:`Qa = ${round1((minP+a1*a2*2-c1)/a1)}` },
      ]
    };
  },

  B5: (stars) => {
    const a = ri(30, 80), b = ri(1, 4);
    return { context: `TO = ${a}Q вҲ’ ${b}QВІ. Bepaal de MO-functie (= afgeleide van TO).`, steps: [
      { q:`Wat is de constante term in MO?`, a: a, hint:`Afgeleide van ${a}Q is ${a}.`, expl:`MO begint met ${a}` },
      { q:`Wat is de coГ«fficiГ«nt van Q in MO? (met teken)`, a: -(2*b), hint:`Afgeleide van вҲ’${b}QВІ = вҲ’${2*b}Q`, expl:`MO = ${a} вҲ’ ${2*b}Q` },
      { q:`Bij welke Q is MO = 0?`, a: round1(a/(2*b)), hint:`${a} = ${2*b}Q вҶ’ Q = ?`, expl:`Q = ${a} Г· ${2*b} = ${round1(a/(2*b))}` },
    ]};
  },

  B6: (stars) => {
    const a = round1(pick([0.5, 1, 1.5, 2])), b = ri(5, 20), c = ri(50, 200);
    return { context: `TK = ${a}QВІ + ${b}Q + ${c}. Bepaal de MK-functie.`, steps: [
      { q:`MK is de afgeleide van TK. Wat is de coГ«fficiГ«nt van Q in MK?`, a: round1(2*a), hint:`Afgeleide van ${a}QВІ = ${round1(2*a)}Q`, expl:`${a}QВІ вҶ’ ${round1(2*a)}Q` },
      { q:`Wat is de constante in MK?`, a: b, hint:`Afgeleide van ${b}Q = ${b}`, expl:`MK = ${round1(2*a)}Q + ${b}` },
    ]};
  },

  B7: (stars) => {
    const a = pick([0.5, 1, 2]), b = ri(5, 15), c = ri(50, 200);
    const Q = ri(5, 20);
    const tk = round1(a*Q*Q + b*Q + c);
    const gtk = round2(tk / Q);
    return {
      context: `TK = ${a}QВІ + ${b}Q + ${c}. Bereken GTK bij Q = ${Q}.`,
      steps: [
        { q:`Bereken TK bij Q = ${Q}: ${a}Г—${Q}ВІ + ${b}Г—${Q} + ${c} = ?`, a: tk, hint:`${a}Г—${Q*Q} + ${b*Q} + ${c}`, expl:`TK = ${a}Г—${Q*Q} + ${b*Q} + ${c} = ${tk}` },
        { q:`GTK = TK Г· Q = ${tk} Г· ${Q} = ?`, a: gtk, hint:`Deel ${tk} door ${Q}.`, expl:`GTK = ${tk} Г· ${Q} = ${gtk}` },
      ]
    };
  },

  S1: (stars) => {
    const b = ri(2, 4), d = ri(1, 3), Ps = ri(10, 20);
    const maxC = Math.min(d * Ps - 1, Math.floor((b + d) * Ps / 2) - 1);
    if (maxC < 2) return GEN.S1(stars);
    const c = ri(2, maxC);
    const alpha = (b + d) * Ps - c;
    const Qs = d * Ps - c;
    if (Qs <= 2) return GEN.S1(stars);
    const pIntercept = round1(alpha / b);
    const cs = round1(0.5 * Qs * (pIntercept - Ps));
    return { context: `Qv = ${alpha} вҲ’ ${b}P en Qa = вҲ’${c} + ${d}P.\nEvenwicht: P* = ${Ps}, Q* = ${Qs}.\nBereken het consumentensurplus.`, steps: [
      { q:`Snijpunt vraaglijn met P-as (Q=0): ${alpha} Г· ${b} = ?`, a: pIntercept, hint:`Vul Q = 0 in bij Qv: ${alpha} = ${b}P`, expl:`Pmax = ${pIntercept}` },
      { q:`CS = ВҪ Г— Q* Г— (Pmax вҲ’ P*) = ВҪ Г— ${Qs} Г— (${pIntercept} вҲ’ ${Ps}) = ?`, a: cs, hint:`ВҪ Г— ${Qs} Г— ${round1(pIntercept - Ps)}`, expl:`CS = ${cs}` },
    ]};
  },

  S2: (stars) => {
    const bMO = ri(2, 6), bMK = ri(1, 4);
    const totalB = bMO + bMK;
    const Qs = ri(3, 15);
    const aMK = ri(5, 20);
    const aMO = aMK + totalB * Qs;
    return { context: `MO = ${aMO} вҲ’ ${bMO}Q en MK = ${aMK} + ${bMK}Q.\nBij welke Q is de winst maximaal?`, steps: [
      { q:`Stel MO = MK en los op. Q* = ?`, a: Qs, hint:`${aMO} вҲ’ ${bMO}Q = ${aMK} + ${bMK}Q вҶ’ ${totalB}Q = ${aMO-aMK}`, expl:`Q* = ${aMO-aMK} Г· ${totalB} = ${Qs}` },
    ]};
  },

  S3: (stars) => {
    const a = ri(40, 80), b = ri(1, 3), tkA = pick([0.5, 1, 2]), tkB = ri(5, 15), tkC = ri(50, 200);
    const Q = ri(5, 15);
    const to = round1(a * Q - b * Q * Q);
    const tk = round1(tkA * Q * Q + tkB * Q + tkC);
    const winst = round1(to - tk);
    return {
      context: `TO = ${a}Q вҲ’ ${b}QВІ en TK = ${tkA}QВІ + ${tkB}Q + ${tkC}.\nBereken de winst bij Q = ${Q}.`,
      steps: [
        { q:`Bereken TO bij Q = ${Q}: ${a}Г—${Q} вҲ’ ${b}Г—${Q}ВІ = ?`, a: to, hint:`${a*Q} вҲ’ ${b*Q*Q}`, expl:`TO = ${a*Q} вҲ’ ${b*Q*Q} = ${to}` },
        { q:`Bereken TK bij Q = ${Q}: ${tkA}Г—${Q}ВІ + ${tkB}Г—${Q} + ${tkC} = ?`, a: tk, hint:`${tkA*Q*Q} + ${tkB*Q} + ${tkC}`, expl:`TK = ${tk}` },
        { q:`Winst = TO вҲ’ TK = ${to} вҲ’ ${tk} = ?`, a: winst, hint:`Trek TK af van TO.`, expl:`Winst = ${to} вҲ’ ${tk} = ${winst}` },
      ]
    };
  },

  S4: (stars) => {
    const P = ri(30, 60);
    // TK = aQВІ + bQ + c, TO = PQ. Break-even: PQ = aQВІ + bQ + c вҶ’ aQВІ + (b-P)Q + c = 0
    const a = pick([0.5, 1, 2]);
    // Pick two break-even points Q1, Q2
    const Q1 = ri(3, 8), Q2 = ri(Q1 + 4, Q1 + 12);
    // aQВІ - PQ + bQ + c = 0 вҶ’ a(Q-Q1)(Q-Q2)=0 вҶ’ aQВІ - a(Q1+Q2)Q + aQ1Q2 = 0
    // So: b - P = -a*(Q1+Q2) вҶ’ b = P - a*(Q1+Q2)
    // c = a*Q1*Q2
    const b = round1(P - a * (Q1 + Q2));
    const c = round1(a * Q1 * Q2);
    if (b < 0) return GEN.S4(stars); // need positive b for realistic TK
    return {
      context: `TO = ${P}Q en TK = ${a}QВІ + ${b}Q + ${c}.\nBij welke hoeveelheden is er break-even?`,
      steps: [
        { q:`Stel TO = TK: ${P}Q = ${a}QВІ + ${b}Q + ${c}. Herschrijf: ${a}QВІ + ?Q + ${c} = 0. CoГ«fficiГ«nt van Q = ?`, a: round1(b - P), hint:`${b} вҲ’ ${P} = ?`, expl:`${b} вҲ’ ${P} = ${round1(b-P)}` },
        { q:`Eerste break-even hoeveelheid (de kleinste Q) = ?`, a: Q1, hint:`Los de kwadratische vergelijking op, of gebruik de abc-formule.`, expl:`QвӮҒ = ${Q1}` },
        { q:`Tweede break-even hoeveelheid = ?`, a: Q2, hint:`De grotere oplossing.`, expl:`QвӮӮ = ${Q2}. Tussen Q=${Q1} en Q=${Q2} maakt het bedrijf winst.` },
      ]
    };
  },

  S5: (stars) => {
    const b = ri(2, 5), d = ri(1, 4), Ps = ri(10, 25);
    const maxC = Math.min(d * Ps - 1, Math.floor((b + d) * Ps / 2) - 1);
    if (maxC < 3) return GEN.S5(stars);
    const c = ri(3, maxC);
    const alpha = (b + d) * Ps - c; // Qv intercept: so that (alpha+c)/(b+d) = Ps
    const Qs = d * Ps - c; // = alpha - b*Ps
    if (Qs <= 2) return GEN.S5(stars);
    const heffing = ri(2, 8);
    const newC = c + d * heffing;
    const newPs = round1((alpha + newC) / (b + d));
    const newQs = round1(alpha - b * newPs);
    if (newQs <= 0) return GEN.S5(stars);
    return {
      context: `Qv = ${alpha} вҲ’ ${b}P en Qa = вҲ’${c} + ${d}P.\nDe overheid heft вӮ¬${heffing} per stuk bij de producent.\nBereken het nieuwe evenwicht.`,
      steps: [
        { q:`Nieuwe aanbod: producent ontvangt P вҲ’ ${heffing}. Nieuwe constante in Qa: ${c} + ${d}Г—${heffing} = ?`, a: newC, hint:`De "drempel" verschuift met ${d}Г—${heffing}.`, expl:`Nieuwe Qa = вҲ’${newC} + ${d}P` },
        { q:`Nieuw evenwicht: ${alpha} вҲ’ ${b}P = вҲ’${newC} + ${d}P. P* = ?`, a: newPs, hint:`${alpha} + ${newC} = ${b+d}P`, expl:`P* = ${alpha + newC} Г· ${b+d} = ${newPs}` },
        { q:`Nieuwe Q*: ${alpha} вҲ’ ${b} Г— ${newPs} = ?`, a: newQs, hint:`Vul de nieuwe P* in.`, expl:`Q* = ${newQs}` },
      ]
    };
  },

  S6: (stars) => {
    const n = ri(2, 4);
    const aInd = ri(1, 3), cInd = ri(4, 10);
    // Individual: P = aInd*Qi + cInd вҶ’ Qi = (P - cInd)/aInd
    // Collective: Qcol = n * (P - cInd)/aInd = (n/aInd)*P - n*cInd/aInd
    const testP = cInd + aInd * ri(2, 6);
    const qInd = (testP - cInd) / aInd;
    const qCol = n * qInd;
    return {
      context: `${n} identieke bedrijven, elk met individueel aanbod: P = ${aInd}Qi + ${cInd}.\nBepaal het collectieve aanbod.`,
      steps: [
        { q:`Schrijf om naar Qi: Qi = (P вҲ’ ${cInd}) / ${aInd}. Vanaf welke P wordt er aangeboden?`, a: cInd, hint:`Qi вүҘ 0 als P вүҘ ?`, expl:`Minimumprijs = ${cInd}` },
        { q:`Bij P = ${testP}: Qi per bedrijf = (${testP} вҲ’ ${cInd}) / ${aInd} = ?`, a: qInd, hint:`Vul in en reken uit.`, expl:`Qi = ${qInd}` },
        { q:`Collectief: Qcol = ${n} Г— ${qInd} = ?`, a: qCol, hint:`Vermenigvuldig met het aantal bedrijven.`, expl:`Qcol = ${n} Г— ${qInd} = ${qCol}` },
      ]
    };
  },

  // в”Җв”Җ EINDBAZEN в”Җв”Җ

  E1: (stars) => {
    const P = ri(40, 70);
    const a = pick([0.5, 1, 2]);
    const Q1 = ri(3, 8), Q2 = ri(Q1 + 5, Q1 + 15);
    const b = round1(P - a * (Q1 + Q2));
    const c = round1(a * Q1 * Q2);
    if (b < 0) return GEN.E1(stars);
    const Qmid = Math.round((Q1 + Q2) / 2);
    const winstMid = round1(P * Qmid - (a * Qmid * Qmid + b * Qmid + c));
    return {
      context: `Een producent verkoopt voor P = ${P}.\nTK = ${a}QВІ + ${b}Q + ${c}.\nVoer een volledige break-even analyse uit.`,
      steps: [
        { q:`TO = ${P}Q. Stel TO = TK en herschrijf naar de vorm ${a}QВІ + ?Q + ${c} = 0. CoГ«fficiГ«nt van Q = ?`, a: round1(b-P), hint:`Alle Q-termen naar links: ${a}QВІ + ${b}Q вҲ’ ${P}Q + ${c} = 0. CoГ«fficiГ«nt = ${b} вҲ’ ${P}`, expl:`${b} вҲ’ ${P} = ${round1(b-P)}` },
        { q:`Eerste break-even (kleinste Q)?`, a: Q1, hint:`Gebruik de abc-formule.`, expl:`QвӮҒ = ${Q1}` },
        { q:`Tweede break-even (grootste Q)?`, a: Q2, hint:`De tweede oplossing.`, expl:`QвӮӮ = ${Q2}` },
        { q:`Bereken de winst bij Q = ${Qmid} (tussen de break-evens): TO вҲ’ TK = ?`, a: winstMid, hint:`TO = ${P*Qmid}, TK = ${round1(a*Qmid*Qmid + b*Qmid + c)}`, expl:`Winst = ${P*Qmid} вҲ’ ${round1(a*Qmid*Qmid+b*Qmid+c)} = ${winstMid}` },
      ]
    };
  },

  E2: (stars) => {
    const b = ri(2, 5), d = ri(1, 4);
    const Ps = ri(8, 20);
    const maxC = Math.min(d * Ps - 2, Math.floor((b + d) * Ps / 2) - 1);
    if (maxC < 2) return GEN.E2(stars);
    const c = ri(2, maxC);
    const alpha = (b + d) * Ps - c;
    const Qs = d * Ps - c;
    if (Qs <= 2) return GEN.E2(stars);
    const pMax = round1(alpha / b);
    const cs = round1(0.5 * Qs * (pMax - Ps));
    return { context: `Qv = ${alpha} вҲ’ ${b}P en Qa = вҲ’${c} + ${d}P.\nBereken het consumentensurplus volledig.`, steps: [
      { q:`Bereken het evenwicht. P* = ?`, a: Ps, hint:`Qv = Qa вҶ’ ${alpha+c} Г· ${b+d}`, expl:`P* = ${Ps}` },
      { q:`Q* = ?`, a: Qs, hint:`${alpha} вҲ’ ${b}Г—${Ps}`, expl:`Q* = ${Qs}` },
      { q:`Snijpunt vraaglijn met P-as (Q=0): ${alpha}/${b} = ?`, a: pMax, hint:`Stel Q = 0 in de vraaglijn.`, expl:`Pmax = ${pMax}` },
      { q:`CS = ВҪ Г— Q* Г— (Pmax вҲ’ P*) = ?`, a: cs, hint:`ВҪ Г— ${Qs} Г— ${round1(pMax-Ps)}`, expl:`CS = ${cs}` },
    ]};
  },

  E3: (stars) => {
    const n1 = ri(2, 3), n2 = ri(1, 2);
    const a1 = pick([1, 2]), c1 = ri(4, 10);
    const a2 = pick([1, 2, 3]), c2 = ri(6, 14);
    const testP = Math.max(c1, c2) + ri(4, 10);
    const q1 = round1((testP - c1) / a1);
    const q2 = round1((testP - c2) / a2);
    const qTot = round1(n1 * q1 + (testP >= c2 ? n2 * q2 : 0));
    return {
      context: `Groep A: ${n1} bedrijven, elk P = ${a1}Q + ${c1}\nGroep B: ${n2} bedrijf(ven), elk P = ${a2}Q + ${c2}\nBepaal het collectieve aanbod.`,
      steps: [
        { q:`Groep A: Qi = (PвҲ’${c1})/${a1}. Per bedrijf bij P=${testP}: Qa = ?`, a: q1, hint:`(${testP}вҲ’${c1})/${a1}`, expl:`Qa = ${q1}` },
        { q:`Totaal groep A: ${n1} Г— ${q1} = ?`, a: round1(n1*q1), hint:`Vermenigvuldig.`, expl:`${n1} Г— ${q1} = ${round1(n1*q1)}` },
        { q:`Groep B: per bedrijf bij P=${testP}: Qb = (${testP}вҲ’${c2})/${a2} = ?`, a: q2, hint:`Vul in.`, expl:`Qb = ${q2}` },
        { q:`Totaal collectief bij P=${testP}: ${n1}Г—${q1} + ${n2}Г—${q2} = ?`, a: qTot, hint:`Tel alle individuele hoeveelheden op.`, expl:`Qcol = ${qTot}` },
      ]
    };
  },

  E4: (stars) => {
    const b = ri(2, 4), d = ri(1, 3);
    const Ps = ri(10, 20), heffing = ri(3, 8);
    const maxC = Math.min(d*Ps - 2, Math.floor((b+d)*Ps/2) - 1);
    if (maxC < 3) return GEN.E4(stars);
    const c = ri(3, maxC);
    const alpha = (b+d)*Ps - c;
    const Qs = d*Ps - c;
    if (Qs <= 5) return GEN.E4(stars);
    const newC = c + d*heffing;
    const Pn = round1((alpha + newC)/(b+d));
    const Qn = round1(alpha - b*Pn);
    if (Qn <= 0) return GEN.E4(stars);
    const dwl = round1(0.5 * (Qs - Qn) * heffing);
    return { context: `Qv = ${alpha} вҲ’ ${b}P, Qa = вҲ’${c} + ${d}P.\nHeffing: вӮ¬${heffing}/stuk.\nBereken het welvaartsverlies.`, steps: [
      { q:`Oud evenwicht: P* = ?`, a: Ps, hint:`Qv = Qa вҶ’ (${alpha}+${c}) Г· ${b+d}`, expl:`P* = ${Ps}` },
      { q:`Oude Q* = ?`, a: Qs, hint:`${alpha} вҲ’ ${b}Г—${Ps}`, expl:`Q* = ${Qs}` },
      { q:`Nieuwe constante in Qa na heffing: ${c} + ${d}Г—${heffing} = ?`, a: newC, hint:`Verschuiving = ${d}Г—${heffing}`, expl:`Nieuwe constante = ${newC}` },
      { q:`Nieuw evenwicht: P_nieuw = ?`, a: Pn, hint:`(${alpha}+${newC}) Г· ${b+d}`, expl:`P_nieuw = ${Pn}` },
      { q:`Nieuwe Q = ?`, a: Qn, hint:`${alpha} вҲ’ ${b}Г—${Pn}`, expl:`Q_nieuw = ${Qn}` },
      { q:`Welvaartsverlies = ВҪ Г— (${Qs}вҲ’${round1(Qn)}) Г— ${heffing} = ?`, a: dwl, hint:`Driehoek: ВҪ Г— О”Q Г— heffing`, expl:`DWL = ВҪ Г— ${round1(Qs-Qn)} Г— ${heffing} = ${dwl}` },
    ]};
  },

  E5: (stars) => {
    const P = ri(25, 50);
    const a = pick([0.5, 1, 1.5, 2]), bk = ri(3, 12), ck = ri(50, 200);
    // MK = 2aQ + bk, P = MK вҶ’ Q = (P - bk)/(2a)
    const Qs = round1((P - bk) / (2 * a));
    if (Qs <= 0 || Qs !== Math.round(Qs * 10) / 10) return GEN.E5(stars);
    const tk = round1(a * Qs * Qs + bk * Qs + ck);
    const gtk = round2(tk / Qs);
    const winstPerStuk = round2(P - gtk);
    const totWinst = round1(winstPerStuk * Qs);
    return {
      context: `Marktprijs P = ${P} (volledige mededinging).\nTK = ${a}QВІ + ${bk}Q + ${ck}.\nBepaal de optimale productie en winst.`,
      steps: [
        { q:`MK = ${round1(2*a)}Q + ${bk}. Stel P = MK: ${P} = ${round1(2*a)}Q + ${bk}. Q* = ?`, a: Qs, hint:`(${P} вҲ’ ${bk}) Г· ${round1(2*a)}`, expl:`Q* = ${round1(P - bk)} Г· ${round1(2*a)} = ${Qs}` },
        { q:`Bereken TK bij Q* = ${Qs}: ?`, a: tk, hint:`${a}Г—${Qs}ВІ + ${bk}Г—${Qs} + ${ck}`, expl:`TK = ${tk}` },
        { q:`GTK = TK/Q = ${tk}/${Qs} = ?`, a: gtk, hint:`Deel TK door Q.`, expl:`GTK = ${gtk}` },
        { q:`Winst per stuk = P вҲ’ GTK = ${P} вҲ’ ${gtk} = ?`, a: winstPerStuk, hint:`Trek GTK af van de prijs.`, expl:`Winst/stuk = ${winstPerStuk}` },
        { q:`Totale winst = ${winstPerStuk} Г— ${Qs} = ?`, a: totWinst, hint:`Vermenigvuldig.`, expl:`Totale winst = ${totWinst}` },
      ]
    };
  },

  E6: (stars) => {
    const b = ri(2, 4), d = ri(1, 3);
    const Ps = ri(15, 25);
    const c = ri(5, d*Ps - 2);
    const a = (b+d)*Ps + c;
    const Qs = a - b*Ps;
    const Pw = Ps - ri(3, 7); // world price < domestic
    const Qd = a - b*Pw; // domestic demand at Pw
    const Qsup = Math.max(0, -c + d*Pw); // domestic supply at Pw
    const importR = ri(2, 5);
    const QdNew = a - b*(Pw + importR);
    const QsupNew = Math.max(0, -c + d*(Pw + importR));
    const deltaCS = round1(0.5 * (Qd + QdNew) * importR);
    const govRev = round1(importR * (QdNew - QsupNew));
    if (Qsup < 0 || QsupNew < 0 || QdNew <= QsupNew) return GEN.E6(stars);
    return {
      context: `Qv = ${a} вҲ’ ${b}P, Qa = вҲ’${c} + ${d}P.\nWereldmarktprijs Pw = ${Pw}. Invoerrecht: вӮ¬${importR}/stuk.\nAnalyseer de effecten.`,
      steps: [
        { q:`Bij Pw = ${Pw}: binnenlandse vraag Qd = ${a} вҲ’ ${b}Г—${Pw} = ?`, a: Qd, hint:`Vul Pw in bij Qv.`, expl:`Qd = ${Qd}` },
        { q:`Bij Pw = ${Pw}: binnenlands aanbod Qs = вҲ’${c} + ${d}Г—${Pw} = ?`, a: Qsup, hint:`Vul Pw in bij Qa.`, expl:`Qs = ${Qsup}` },
        { q:`Import zonder heffing = Qd вҲ’ Qs = ?`, a: Qd - Qsup, hint:`Vraag вҲ’ aanbod.`, expl:`Import = ${Qd - Qsup}` },
        { q:`Met invoerrecht: nieuwe prijs = ${Pw} + ${importR} = ?`, a: Pw + importR, hint:`Tel het invoerrecht op.`, expl:`P_nieuw = ${Pw + importR}` },
        { q:`Nieuwe import = ${QdNew} вҲ’ ${QsupNew} = ?`, a: QdNew - QsupNew, hint:`Nieuwe vraag вҲ’ nieuw aanbod.`, expl:`Import = ${QdNew - QsupNew}` },
        { q:`Overheidsinkomsten = ${importR} Г— ${QdNew - QsupNew} = ?`, a: govRev, hint:`Heffing Г— import.`, expl:`Overheidsinkomsten = ${govRev}` },
      ]
    };
  },

  E7: (stars) => {
    const aP = ri(60, 120), bP = ri(1, 4);
    const aTK = pick([0.5, 1, 2]), bTK = ri(5, 20), cTK = ri(50, 200);
    const Qs = round1((aP - bTK) / (2 * bP + 2 * aTK));
    if (Qs <= 0 || Qs !== Math.round(Qs * 10) / 10) return GEN.E7(stars);
    const Pstar = round1(aP - bP * Qs);
    const TO = round1(Pstar * Qs);
    const TK = round1(aTK * Qs * Qs + bTK * Qs + cTK);
    const winst = round1(TO - TK);
    return { context: `Monopolist: P = ${aP} вҲ’ ${bP}Q.\nTK = ${aTK}QВІ + ${bTK}Q + ${cTK}.\nBepaal de maximale winst.`, steps: [
      { q:`MO = ${aP} вҲ’ ${2*bP}Q en MK = ${round1(2*aTK)}Q + ${bTK}. Stel MO = MK. Q* = ?`, a: Qs, hint:`${aP} вҲ’ ${bTK} = (${2*bP} + ${round1(2*aTK)})Q`, expl:`Q* = ${round1(aP-bTK)} Г· ${round1(2*bP+2*aTK)} = ${Qs}` },
      { q:`P* = ${aP} вҲ’ ${bP} Г— ${Qs} = ?`, a: Pstar, hint:`Vul Q* in de vraaglijn.`, expl:`P* = ${Pstar}` },
      { q:`TO = P* Г— Q* = ?`, a: TO, hint:`${Pstar} Г— ${Qs}`, expl:`TO = ${TO}` },
      { q:`TK bij Q* = ${Qs}: ?`, a: TK, hint:`${aTK}Г—${Qs}ВІ + ${bTK}Г—${Qs} + ${cTK}`, expl:`TK = ${TK}` },
      { q:`Winst = TO вҲ’ TK = ?`, a: winst, hint:`${TO} вҲ’ ${TK}`, expl:`Winst = ${winst}` },
    ]};
  },

  E8: (stars) => {
    const a1 = ri(60, 100), b1 = ri(1, 3);
    const a2 = ri(80, 140), b2 = ri(2, 5);
    const mk = ri(10, 25);
    const Q1 = round1((a1 - mk) / (2 * b1));
    const Q2 = round1((a2 - mk) / (2 * b2));
    if (Q1 <= 0 || Q2 <= 0) return GEN.E8(stars);
    const P1 = round1(a1 - b1 * Q1);
    const P2 = round1(a2 - b2 * Q2);
    const winst1 = round1((P1 - mk) * Q1);
    const winst2 = round1((P2 - mk) * Q2);
    const totWinst = round1(winst1 + winst2);
    return { context: `Prijsdiscriminatie. MK = ${mk} (constant).\nMarkt 1: PвӮҒ = ${a1} вҲ’ ${b1}QвӮҒ\nMarkt 2: PвӮӮ = ${a2} вҲ’ ${b2}QвӮӮ`, steps: [
      { q:`Markt 1: MOвӮҒ = MK. QвӮҒ = ?`, a: Q1, hint:`(${a1}вҲ’${mk}) Г· ${2*b1}`, expl:`QвӮҒ = ${Q1}` },
      { q:`PвӮҒ = ${a1} вҲ’ ${b1}Г—${Q1} = ?`, a: P1, hint:`Vul QвӮҒ in.`, expl:`PвӮҒ = ${P1}` },
      { q:`Markt 2: MOвӮӮ = MK. QвӮӮ = ?`, a: Q2, hint:`(${a2}вҲ’${mk}) Г· ${2*b2}`, expl:`QвӮӮ = ${Q2}` },
      { q:`PвӮӮ = ${a2} вҲ’ ${b2}Г—${Q2} = ?`, a: P2, hint:`Vul QвӮӮ in.`, expl:`PвӮӮ = ${P2}` },
      { q:`Winst markt 1: (PвӮҒ вҲ’ MK) Г— QвӮҒ = ?`, a: winst1, hint:`(${P1}вҲ’${mk})Г—${Q1}`, expl:`WinstвӮҒ = ${winst1}` },
      { q:`Winst markt 2: (PвӮӮ вҲ’ MK) Г— QвӮӮ = ?`, a: winst2, hint:`(${P2}вҲ’${mk})Г—${Q2}`, expl:`WinstвӮӮ = ${winst2}` },
      { q:`Totale winst = ?`, a: totWinst, hint:`${winst1} + ${winst2}`, expl:`Totaal = ${totWinst}` },
    ]};
  },
};

/* в”Җв”Җ main component в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
function EconGame() {
  const [stars, setStars] = React.useState({});
  const [view, setView] = React.useState("tree"); // tree | exercise
  const [activeSkill, setActiveSkill] = React.useState(null);
  const [exercise, setExercise] = React.useState(null);
  const [stepIdx, setStepIdx] = React.useState(0);
  const [input, setInput] = React.useState("");
  const [feedback, setFeedback] = React.useState(null); // null | "correct" | "wrong"
  const [showHint, setShowHint] = React.useState(false);
  const [showExpl, setShowExpl] = React.useState(false);
  const [errors, setErrors] = React.useState(0);
  const [hints, setHints] = React.useState(0);
  const [completedSteps, setCompletedSteps] = React.useState([]);
  const [showStarAnim, setShowStarAnim] = React.useState(0);
  const [loaded, setLoaded] = React.useState(false);
  const inputRef = React.useRef(null);

  // Load progress
  React.useEffect(() => {
    try {
      const saved = localStorage.getItem("skilltree_3.2.1");
      if (saved) setStars(JSON.parse(saved));
    } catch(e) {}
    setLoaded(true);
  }, []);

  // Save progress
  React.useEffect(() => {
    if (!loaded) return;
    try { localStorage.setItem("skilltree_3.2.1", JSON.stringify(stars)); } catch(e) {}
  }, [stars, loaded]);

  const prereqsDone = React.useCallback((skill) => {
    return skill.needs.every(nid => (stars[nid] || 0) >= 1);
  }, [stars]);

  const startExercise = (skill) => {
    const gen = GEN[skill.id];
    if (!gen) return;
    let ex;
    for (let i = 0; i < 20; i++) { ex = gen(stars); if (ex) break; }
    if (!ex) return;
    setActiveSkill(skill);
    setExercise(ex);
    setStepIdx(0);
    setInput("");
    setFeedback(null);
    setShowHint(false);
    setShowExpl(false);
    setErrors(0);
    setHints(0);
    setCompletedSteps([]);
    setView("exercise");
    setTimeout(() => inputRef.current?.focus(), 100);
  };

  const advanceTimerRef = React.useRef(null);

  const checkAnswer = () => {
    if (!exercise || feedback === "correct") return;
    const step = exercise.steps[stepIdx];
    const cleaned = input.replace(",", ".").replace(/\s/g, "").replace(/вҲ’/g, "-");
    const userVal = parseFloat(cleaned);
    if (isNaN(userVal)) { setFeedback("wrong"); return; }
    const tolerance = Math.abs(step.a) < 0.5 ? 0.08 : Math.abs(step.a) < 10 ? 0.2 : Math.abs(step.a) * 0.02;
    if (Math.abs(userVal - step.a) <= tolerance) {
      setFeedback("correct");
      setShowExpl(true);
      setCompletedSteps(prev => [...prev, { ...step, userAnswer: userVal }]);
      const isLastStep = stepIdx + 1 >= exercise.steps.length;
      // Auto-advance only for non-last steps
      if (!isLastStep) {
        if (advanceTimerRef.current) clearTimeout(advanceTimerRef.current);
        advanceTimerRef.current = setTimeout(() => {
          setStepIdx(s => s + 1);
          setInput("");
          setFeedback(null);
          setShowHint(false);
          setShowExpl(false);
          setTimeout(() => inputRef.current?.focus(), 100);
        }, 1200);
      }
    } else {
      setFeedback("wrong");
      setErrors(e => e + 1);
    }
  };

  const finishExercise = () => {
    const totalPenalty = errors + hints;
    const earned = totalPenalty === 0 ? 3 : totalPenalty <= 2 ? 2 : 1;
    const prev = stars[activeSkill.id] || 0;
    if (earned > prev) {
      setStars(s => ({ ...s, [activeSkill.id]: earned }));
    }
    setShowStarAnim(earned);
    setTimeout(() => {
      setShowStarAnim(0);
      setView("tree");
    }, 2500);
  };

  // Clean up timer on unmount
  React.useEffect(() => {
    return () => { if (advanceTimerRef.current) clearTimeout(advanceTimerRef.current); };
  }, []);

  const toggleMinus = () => {
    setInput(prev => prev.startsWith("-") ? prev.slice(1) : "-" + prev);
    setFeedback(null);
  };

  const useHint = () => {
    setShowHint(true);
    setHints(h => h + 1);
  };

  const handleKeyDown = (e) => {
    if (e.key === "Enter") {
      const isLastStep = stepIdx + 1 >= exercise?.steps?.length;
      if (feedback === "correct" && isLastStep) finishExercise();
      else checkAnswer();
    }
  };

  // Star animation overlay
  if (showStarAnim > 0) {
    return (
      <div style={{
        minHeight:"100vh", background:"#0a0a1a",
        display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
        animation:"fadeIn 0.5s ease"
      }}>
        <div style={{ fontSize:"3rem", marginBottom:16, animation:"bounceIn 0.6s ease" }}>
          {Array.from({length: 3}).map((_, i) => (
            <span key={i} style={{
              color: i < showStarAnim ? "#fbbf24" : "#334155",
              transition: "color 0.3s ease",
              transitionDelay: `${i * 0.3}s`,
              display: "inline-block",
              animation: i < showStarAnim ? `starPop 0.4s ease ${i * 0.3}s both` : "none",
              margin: "0 4px",
            }}>вҳ…</span>
          ))}
        </div>
        <p style={{ color:"#94a3b8", fontSize:"1rem" }}>
          {showStarAnim === 3 ? "Perfect! рҹҺҜ" : showStarAnim === 2 ? "Goed gedaan!" : "Gehaald!"}
        </p>
        <p style={{ color:"#475569", fontSize:"0.8rem", marginTop:8 }}>
          {errors > 0 && `${errors} fout${errors > 1 ? "en" : ""}`}
          {errors > 0 && hints > 0 && ", "}
          {hints > 0 && `${hints} hint${hints > 1 ? "s" : ""} gebruikt`}
          {errors === 0 && hints === 0 && "Zonder fouten of hints!"}
        </p>
      </div>
    );
  }

  // Exercise view
  if (view === "exercise" && exercise && activeSkill) {
    const step = exercise.steps[stepIdx];
    const progress = ((stepIdx + (feedback === "correct" ? 1 : 0)) / exercise.steps.length) * 100;
    const lc = LAYER_COLORS[activeSkill.layer];

    return (
      <div style={{ minHeight:"100vh", background:"#0a0a1a", padding:"16px", fontFamily:"'DM Sans', system-ui, sans-serif" }}>
        {/* Header */}
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12 }}>
          <button onClick={() => setView("tree")} style={{
            background:"none", border:"none", color:"#94a3b8", cursor:"pointer",
            display:"flex", alignItems:"center", padding:4
          }}>
            <ArrowLeft size={20} />
          </button>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:"0.7rem", color:lc.text, fontWeight:600, textTransform:"uppercase", letterSpacing:"0.08em" }}>
              {activeSkill.id}
            </div>
            <div style={{ fontSize:"0.95rem", color:"#f8fafc", fontWeight:600 }}>{activeSkill.name}</div>
          </div>
          <div style={{ fontSize:"0.75rem", color:"#64748b" }}>
            Stap {stepIdx + 1}/{exercise.steps.length}
          </div>
        </div>

        {/* Progress bar */}
        <div style={{ height:4, background:"#1e293b", borderRadius:2, marginBottom:20, overflow:"hidden" }}>
          <div style={{
            height:"100%", background:`linear-gradient(90deg, ${lc.text}, ${lc.glow.replace("0.3","0.8")})`,
            width:`${progress}%`, transition:"width 0.4s ease", borderRadius:2
          }} />
        </div>

        {/* Context */}
        <div style={{
          background:"#111827", border:"1px solid #1e293b", borderRadius:12,
          padding:"14px 16px", marginBottom:16, fontSize:"0.85rem", color:"#cbd5e1",
          lineHeight:1.5, whiteSpace:"pre-line"
        }}>
          {exercise.context}
        </div>

        {/* Completed steps */}
        {completedSteps.map((cs, i) => (
          <div key={i} style={{
            background:"#0d1f0d", border:"1px solid #166534", borderRadius:10,
            padding:"10px 14px", marginBottom:8, fontSize:"0.8rem"
          }}>
            <div style={{ color:"#6ee7b7", fontWeight:500, marginBottom:2 }}>
              вң“ Stap {i + 1}: {cs.q}
            </div>
            <div style={{ color:"#86efac" }}>Antwoord: {cs.a}</div>
          </div>
        ))}

        {/* Current step */}
        <div style={{
          background:"#1e293b", borderRadius:12, padding:"16px",
          border: feedback === "correct" ? "2px solid #22c55e" : feedback === "wrong" ? "2px solid #ef4444" : "1px solid #334155",
          transition:"border-color 0.3s ease",
          animation: feedback === "wrong" ? "shake 0.4s ease" : "none"
        }}>
          <p style={{ color:"#e2e8f0", fontSize:"0.9rem", marginBottom:12, lineHeight:1.4, fontWeight:500 }}>
            {step.q}
          </p>

          <div style={{ display:"flex", gap:6, marginBottom:10 }}>
            <button onClick={toggleMinus} disabled={feedback === "correct"} style={{
              padding:"10px 12px", borderRadius:8, border:"1px solid #475569",
              background:"#1e293b", color:"#94a3b8", fontWeight:700, cursor:"pointer",
              fontSize:"1rem", fontFamily:"'DM Mono', monospace",
              opacity: feedback === "correct" ? 0.4 : 1,
            }}>
              Вұ
            </button>
            <input
              ref={inputRef}
              type="text"
              inputMode="decimal"
              value={input}
              onChange={e => { setInput(e.target.value); setFeedback(null); }}
              onKeyDown={handleKeyDown}
              disabled={feedback === "correct"}
              placeholder="Antwoord (gebruik Вұ voor negatief)"
              style={{
                flex:1, padding:"10px 14px", borderRadius:8, border:"1px solid #475569",
                background:"#0f172a", color:"#f8fafc", fontSize:"1rem", outline:"none",
                fontFamily:"'DM Mono', monospace",
              }}
            />
            {!(feedback === "correct" && stepIdx + 1 >= exercise.steps.length) ? (
              <button onClick={checkAnswer} disabled={feedback === "correct"} style={{
                padding:"10px 18px", borderRadius:8, border:"none",
                background: feedback === "correct" ? "#166534" : lc.bg,
                color: feedback === "correct" ? "#dcfce7" : lc.text,
                fontWeight:600, cursor: feedback === "correct" ? "default" : "pointer",
                fontSize:"0.85rem", opacity: feedback === "correct" ? 0.6 : 1,
              }}>
                Check
              </button>
            ) : (
              <button onClick={finishExercise} style={{
                padding:"10px 18px", borderRadius:8, border:"none",
                background:"#166534", color:"#dcfce7", fontWeight:600, cursor:"pointer",
                fontSize:"0.85rem", display:"flex", alignItems:"center", gap:4,
              }}>
                Klaar <Trophy size={16}/>
              </button>
            )}
          </div>

          {/* Feedback */}
          {feedback === "wrong" && (
            <p style={{ color:"#f87171", fontSize:"0.8rem", marginBottom:8 }}>
              вң— Niet juist. Probeer het opnieuw{!showHint ? " of gebruik een hint." : "."}
            </p>
          )}

          {/* Hint button */}
          {feedback !== "correct" && !showHint && (
            <button onClick={useHint} style={{
              background:"none", border:"1px solid #854d0e", borderRadius:8,
              color:"#fbbf24", padding:"6px 12px", fontSize:"0.78rem", cursor:"pointer",
              display:"flex", alignItems:"center", gap:6
            }}>
              <Lightbulb size={14} /> Hint
            </button>
          )}
          {showHint && (
            <div style={{
              background:"#1a1500", border:"1px solid #854d0e", borderRadius:8,
              padding:"8px 12px", fontSize:"0.8rem", color:"#fde68a", marginTop:4
            }}>
              рҹ’Ў {step.hint}
            </div>
          )}

          {/* Explanation */}
          {showExpl && (
            <div style={{
              background:"#052e16", border:"1px solid #166534", borderRadius:8,
              padding:"10px 14px", fontSize:"0.82rem", color:"#bbf7d0", marginTop:10
            }}>
              вң“ {step.expl}
            </div>
          )}
        </div>

        {/* Score tracker */}
        <div style={{
          display:"flex", justifyContent:"center", gap:16, marginTop:16,
          fontSize:"0.75rem", color:"#64748b"
        }}>
          <span>Fouten: {errors}</span>
          <span>Hints: {hints}</span>
          <span style={{ color: errors + hints === 0 ? "#fbbf24" : "#64748b" }}>
            {errors + hints === 0 ? "вҳ…вҳ…вҳ…" : errors + hints <= 2 ? "вҳ…вҳ…вҳҶ" : "вҳ…вҳҶвҳҶ"}
          </span>
        </div>
      </div>
    );
  }

  // Skill tree view
  return (
    <div style={{ minHeight:"100vh", background:"#0a0a1a", fontFamily:"'DM Sans', system-ui, sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono&display=swap');
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        @keyframes starPop { 0%{transform:scale(0) rotate(-20deg);opacity:0} 60%{transform:scale(1.3) rotate(5deg);opacity:1} 100%{transform:scale(1) rotate(0deg);opacity:1} }
        @keyframes nodeGlow { 0%,100%{box-shadow:0 0 8px var(--glow)} 50%{box-shadow:0 0 18px var(--glow)} }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
        * { margin:0; padding:0; box-sizing:border-box; }
      `}</style>

      {/* Header */}
      <div style={{ padding:"24px 16px 8px", textAlign:"center" }}>
        <h1 style={{
          fontSize:"1.5rem", fontWeight:700, color:"#f8fafc",
          letterSpacing:"-0.02em", margin:0
        }}>
          Economie Skill Tree
        </h1>
        <p style={{ color:"#64748b", fontSize:"0.8rem", marginTop:4 }}>
          Verdien sterren en bouw je vaardigheden op
        </p>
        {/* Total progress */}
        <div style={{ marginTop:10, fontSize:"0.75rem", color:"#94a3b8" }}>
          {Object.values(stars).filter(s => s >= 1).length} / {FILTERED_SKILLS.length} vaardigheden
          {" В· "}
          {Object.values(stars).reduce((a, b) => a + b, 0)} / {FILTERED_SKILLS.length * 3} sterren
        </div>
      </div>

      {/* Layers */}
      <div style={{ padding:"12px 12px 80px" }}>
        {LAYER_NAMES.map((layerName, li) => {
          const lc = LAYER_COLORS[li];
          const layerSkills = FILTERED_SKILLS.filter(s => s.layer === li);
          return (
            <div key={li} style={{ marginBottom:16 }}>
              <div style={{
                fontSize:"0.7rem", textTransform:"uppercase", letterSpacing:"0.1em",
                color: lc.text, fontWeight:700, marginBottom:8, paddingLeft:4,
                display:"flex", alignItems:"center", gap:6
              }}>
                {li === 3 && <span>рҹҸҶ</span>}
                Laag {li + 1} вҖ” {layerName}
              </div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                {layerSkills.map(skill => {
                  const ready = prereqsDone(skill);
                  const starCount = stars[skill.id] || 0;
                  const hasGen = !!GEN[skill.id];
                  const missingNeeds = skill.needs.filter(nid => (stars[nid] || 0) < 1);

                  return (
                    <button
                      key={skill.id}
                      onClick={() => hasGen && startExercise(skill)}
                      disabled={!hasGen}
                      style={{
                        padding:"10px 14px", borderRadius:12,
                        border: starCount === 3 ? `2px solid #fbbf24` : `1px solid ${lc.text}40`,
                        background: lc.bg,
                        color: lc.text,
                        fontSize:"0.78rem", fontWeight:500,
                        cursor: hasGen ? "pointer" : "default",
                        textAlign:"left", maxWidth:180, lineHeight:1.3,
                        opacity: ready || starCount > 0 ? 1 : 0.7,
                        transition:"all 0.2s ease",
                        "--glow": lc.glow,
                        boxShadow: starCount >= 1 ? `0 0 12px ${lc.glow}` : "none",
                        position:"relative",
                        fontFamily:"inherit",
                      }}
                    >
                      <div style={{
                        fontSize:"0.6rem", fontWeight:700, opacity:0.5, marginBottom:2,
                        display:"flex", justifyContent:"space-between", alignItems:"center"
                      }}>
                        <span>{skill.id}</span>
                        {!ready && missingNeeds.length > 0 && starCount === 0 && (
                          <span style={{ fontSize:"0.55rem", opacity:0.7 }} title={`Tip: oefen eerst ${missingNeeds.join(", ")}`}>
                            рҹ’Ў {missingNeeds.join(", ")}
                          </span>
                        )}
                      </div>
                      <div>{li === 3 ? "рҹҸҶ " : ""}{skill.name}</div>
                      {starCount > 0 && (
                        <div style={{ marginTop:4, fontSize:"0.7rem", letterSpacing:2 }}>
                          {Array.from({length:3}).map((_, i) => (
                            <span key={i} style={{ color: i < starCount ? "#fbbf24" : "#334155" }}>вҳ…</span>
                          ))}
                        </div>
                      )}
                      {starCount === 0 && (
                        <div style={{
                          marginTop:4, fontSize:"0.65rem", color: lc.text, opacity:0.6,
                        }}>
                          Tap om te oefenen вҶ’
                        </div>
                      )}
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {/* Reset button */}
      <div style={{ position:"fixed", bottom:16, right:16 }}>
        <button
          onClick={() => { if (confirm("Weet je zeker dat je alle voortgang wilt resetten?")) setStars({}); }}
          style={{
            background:"#1e293b", border:"1px solid #334155", borderRadius:10,
            padding:"8px 12px", color:"#64748b", cursor:"pointer", fontSize:"0.7rem",
            display:"flex", alignItems:"center", gap:4, fontFamily:"inherit"
          }}
        >
          <RotateCcw size={12} /> Reset
        </button>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<EconGame />);
    </script>
</body>
</html>
